version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: notion_lite_db
    environment:
      POSTGRES_DB: markdown_notes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432" # Mapped to 5433 to avoid conflicts with running local v18 service on port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notion_lite_backend
    volumes:
      - ./backend:/app
      - /app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notion_lite_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
